<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kino base — 竣工記念動画メーカー</title>

<!-- PWA -->
<meta name="theme-color" content="#1A1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="kino base">
<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
body{
  margin:0;
  background:#1A1612;
  color:#F5EFE6;
  font-family:"Noto Sans JP",sans-serif;
}
header{
  padding:14px 20px;
  background:#0E0C0A;
  text-align:center;
  letter-spacing:.2em;
}
main{
  padding:20px;
  max-width:900px;
  margin:auto;
}
input,textarea{
  width:100%;
  padding:8px;
  margin-bottom:8px;
}
button{
  padding:12px 24px;
  font-size:16px;
}
canvas{
  width:100%;
  background:#000;
  margin:20px 0;
}
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<header>kino base｜竣工記念動画プレビュー</header>

<main>
  <input id="owner" placeholder="施主名・物件名">
  <input id="company" placeholder="施工会社名">
  <textarea id="openMsg" placeholder="オープニングメッセージ"></textarea>

  <label>BEFORE写真</label>
  <input type="file" id="before" multiple accept="image/*">

  <label>AFTER写真</label>
  <input type="file" id="after" multiple accept="image/*">

  <label>1枚の表示時間（秒）</label>
  <input type="range" id="dur" min="2" max="8" step="1" value="4">

  <label>BGM音量</label>
  <input type="range" id="vol" min="0" max="100" value="70">

  <canvas id="cv" width="1280" height="720"></canvas>

  <div class="controls">
    <button id="play">▶ プレビュー再生</button>
  </div>
</main>

<script>
/* ===============================
   STATE
================================ */
const S={
  before:[],
  after:[],
  idx:0,
  playing:false,
  dur:4,
  timer:null
};

/* ===============================
   AUDIO
================================ */
let audioReady=false;
let bgm;

async function initAudio(){
  if(audioReady) return;
  await Tone.start();
  bgm=new Tone.Oscillator(220,"sine").toDestination();
  bgm.volume.value=-12;
  audioReady=true;
}

function playBgm(){
  if(bgm.state!=="started") bgm.start();
}

function stopBgm(){
  if(bgm.state==="started") bgm.stop();
}

/* ===============================
   PHOTO LOAD
================================ */
function loadFiles(input,arr){
  arr.length=0;
  [...input.files].forEach(f=>{
    const img=new Image();
    img.src=URL.createObjectURL(f);
    arr.push(img);
  });
}

before.onchange=()=>loadFiles(before,S.before);
after.onchange=()=>loadFiles(after,S.after);

/* ===============================
   DRAW
================================ */
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");

function draw(img){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,cv.width,cv.height);

  if(img){
    ctx.drawImage(img,0,0,cv.width,cv.height);
  }

  ctx.fillStyle="#F5EFE6";
  ctx.font="48px serif";
  ctx.fillText(owner.value||"",60,80);
  ctx.font="28px sans-serif";
  ctx.fillText(company.value||"",60,130);
}

/* ===============================
   SLIDESHOW
================================ */
function nextSlide(){
  const all=[...S.before,...S.after];
  if(all.length===0) return;
  draw(all[S.idx%all.length]);
  S.idx++;
}

async function toggle(){
  if(!S.playing){
    await initAudio();
    playBgm();
    S.playing=true;
    play.textContent="■ 停止";
    nextSlide();
    S.timer=setInterval(nextSlide, dur.value*1000);
  }else{
    stopBgm();
    clearInterval(S.timer);
    S.playing=false;
    play.textContent="▶ プレビュー再生";
  }
}

play.onclick=toggle;
vol.oninput=e=>{ if(bgm) bgm.volume.value = -40 + e.target.value/2; };
dur.oninput=e=>S.dur=e.target.value;
</script>

</body>
</html>
